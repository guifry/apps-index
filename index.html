<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Index of apps built by Guilhem Forey, hosted on GitHub Pages and Vercel."
    />
    <title>Apps — Guilhem Forey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-gradient" aria-hidden="true"></div>

    <header class="hero">
      <div class="hero-inner">
        <p class="eyebrow">index</p>
        <h1>Apps.</h1>
        <p class="tagline">
          Things I build, deployed on GitHub Pages and Vercel.
          <span class="count" id="count"></span>
        </p>

        <div class="controls">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" class="icon">
              <circle cx="11" cy="11" r="7" />
              <path d="m20 20-3.5-3.5" />
            </svg>
            <input
              id="q"
              type="search"
              placeholder="Filter by name, description, or tag…"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <div class="chips" id="platform-chips"></div>
        </div>
      </div>
    </header>

    <main class="grid" id="grid"></main>

    <footer class="site">
      <a href="https://github.com/guifry" target="_blank" rel="noopener">github.com/guifry</a>
      <span class="dot">·</span>
      <a
        href="https://github.com/guifry/apps-index"
        target="_blank"
        rel="noopener"
        >source</a
      >
    </footer>

    <script type="module" src="./main.js"></script>
  </body>
</html>
